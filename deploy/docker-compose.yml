services:
  postgres:
    image: postgres:16-alpine
    container_name: global-latency-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: global_latency_tracker
      POSTGRES_USER: global_latency_tracker
      POSTGRES_PASSWORD: global_latency_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U global_latency_tracker -d global_latency_tracker",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
